<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exoticly</title>
<link rel="stylesheet" href="style.txt">
</head>
<body>

<label class="switch">
  <input type="checkbox" id="themeToggle">
  <div class="slider">
    <div class="slider-btn">
      <div class="light"></div>
      <div class="texture"></div>
      <div class="texture"></div>
      <div class="texture"></div>
      <div class="light"></div>
    </div>
  </div>
</label>

<div id="loadingScreen">
  <h1>Loading Exoticly...</h1>
</div>

<div id="app">

<div class="flip-card">
<div class="flip-card-inner">

<div class="flip-card-front">
<h1>EXOTICLY</h1>
</div>

<div class="flip-card-back">

<p class="desc">Interested in testing before launch? <b>Apply for free!</b></p>

<div class="rating">
<input type="radio" id="star5" name="rating"><label for="star5"></label>
<input type="radio" id="star4" name="rating"><label for="star4"></label>
<input type="radio" id="star3" name="rating"><label for="star3"></label>
<input type="radio" id="star2" name="rating"><label for="star2"></label>
<input type="radio" id="star1" name="rating"><label for="star1"></label>
</div>

<button class="button" id="applyBtn">Apply Now</button>

<div class="container">

<a class="icon yt">
<svg viewBox="0 0 461 461"><path fill="currentColor" d="M300 237L174 297V168z"/></svg>
</a>

<a class="icon tiktok">
<svg viewBox="0 0 512 512"><path fill="currentColor" d="M412 118c-40-20-60-50-70-90h-80v250c0 40-30 70-70 70s-70-30-70-70 30-70 70-70c10 0 20 2 30 5v-80c-100-10-170 60-170 150s70 150 150 150 150-70 150-150V176c30 20 60 30 90 30z"/></svg>
</a>

<a class="icon x">
<svg viewBox="0 0 48 48"><path fill="currentColor" d="M42 12L24 30 6 12h8l10 10 10-10z"/></svg>
</a>

<a class="icon reddit">
<svg viewBox="0 0 90 90"><circle cx="45" cy="45" r="40" fill="currentColor"/></svg>
</a>

</div>

<div class="tooltip-wrapper">
<div class="nav-link">
<div class="tooltip-tab">Support</div>

<div class="tooltip">
<ul class="tooltip-menu-with-icon">
<li>📧 exoticlycompany@gmail.com</li>
<li>⏱ 1–3 days</li>
</ul>
</div>

</div>
</div>

</div>
</div>
</div>

<div id="finalScreen">
<h1>Exoticly ©</h1>
<p>Indie Game</p>
<p>Tester perks: exclusive in-game items + early access</p>
<p class="email">exoticlycompany@gmail.com</p>
<button onclick="location.reload()">Go Back</button>
</div>

<script src="script.txt"></script>
</body>
</html>
